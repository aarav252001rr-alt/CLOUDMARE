<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudMare</title>
<link rel="icon" href="icon.png" type="image/png">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070910;--surface:#0e1117;--surface2:#131620;--surface3:#181c28;
    --border:#1c2030;--border2:#242840;
    --accent:#3d7fff;--accent2:#6c4fff;
    --accent-soft:rgba(61,127,255,.12);--accent-glow:rgba(61,127,255,.22);
    --green:#22c55e;--red:#f04444;--yellow:#f59e0b;
    --text:#eceef5;--text2:#8b90a0;--text3:#565c70;
    --sb:220px;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden}
  body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text)}

  /* ── LAYOUT ── */
  .shell{display:flex;height:100vh}

  /* ── SIDEBAR ── */
  .sidebar{
    width:var(--sb);background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;flex-shrink:0;transition:.3s;
  }
  .sb-head{
    padding:16px 14px 13px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:10px;
  }
  .sb-logo{
    width:30px;height:30px;border-radius:8px;overflow:hidden;flex-shrink:0;
    box-shadow:0 0 14px rgba(61,127,255,.3);
  }
  .sb-logo img{width:100%;height:100%;object-fit:cover;display:block}
  .sb-logo-fb{
    width:100%;height:100%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
  }
  .sb-logo-fb svg{width:16px;height:16px;color:#fff}
  .sb-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800}
  .sb-title span{color:var(--accent)}

  .sb-nav{padding:10px 8px;flex:1;overflow-y:auto}
  .sb-sec{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;padding:10px 8px 4px;margin-top:6px}
  .sb-item{
    display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;
    cursor:pointer;font-size:13.5px;color:var(--text2);transition:.15s;margin-bottom:1px;user-select:none;
  }
  .sb-item:hover{background:var(--surface2);color:var(--text)}
  .sb-item.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .sb-item svg{width:15px;height:15px;flex-shrink:0}

  .sb-foot{padding:12px 8px;border-top:1px solid var(--border)}
  .stor-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px;padding:0 2px}
  .stor-row span:last-child{color:var(--accent)}
  .stor-track{height:3px;background:var(--border2);border-radius:3px;overflow:hidden;margin-bottom:10px}
  .stor-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:.5s;width:2%}
  .user-chip{
    display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:9px;cursor:pointer;transition:.15s;
  }
  .user-chip:hover{background:var(--surface2)}
  .u-av{
    width:28px;height:28px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;
  }
  .u-info{flex:1;min-width:0}
  .u-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .u-bot{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .logout-btn{
    background:none;border:none;cursor:pointer;color:var(--text3);
    padding:4px;border-radius:6px;display:flex;transition:.15s;flex-shrink:0;
  }
  .logout-btn:hover{color:var(--red);background:rgba(240,68,68,.1)}
  .logout-btn svg{width:14px;height:14px}

  /* ── MAIN ── */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}

  /* ── TOPBAR ── */
  .topbar{
    display:flex;align-items:center;gap:10px;padding:11px 20px;
    border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;
  }
  .mob-btn{
    display:none;width:34px;height:34px;border-radius:8px;border:1px solid var(--border);
    background:none;cursor:pointer;color:var(--text2);align-items:center;justify-content:center;flex-shrink:0;
  }
  .mob-btn svg{width:16px;height:16px}
  .search-box{flex:1;position:relative}
  .search-box svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3);pointer-events:none}
  .search-box input{
    width:100%;background:var(--surface2);border:1px solid var(--border2);
    border-radius:9px;padding:9px 13px 9px 34px;
    color:var(--text);font-family:'Figtree',sans-serif;font-size:13.5px;outline:none;transition:.2s;
  }
  .search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .search-box input::placeholder{color:var(--text3)}
  .tb-acts{display:flex;gap:6px}
  .ico-btn{
    width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);
    background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:var(--text2);transition:.15s;
  }
  .ico-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .ico-btn svg{width:15px;height:15px}

  /* ── CONTENT ── */
  .content{flex:1;overflow-y:auto;padding:18px 20px}

  /* ── SYNCING BANNER ── */
  .sync-banner{
    display:none;align-items:center;gap:10px;
    background:var(--accent-soft);border:1px solid rgba(61,127,255,.2);
    border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--text2);
  }
  .sync-banner.on{display:flex}
  .sync-banner svg{width:15px;height:15px;color:var(--accent);flex-shrink:0}

  /* ── BREADCRUMB ── */
  .bc{display:flex;align-items:center;gap:5px;margin-bottom:14px;font-size:13px;flex-wrap:wrap}
  .bc-item{color:var(--text2);cursor:pointer;font-weight:500;transition:.15s}
  .bc-item:hover{color:var(--accent)}
  .bc-item.cur{color:var(--text);cursor:default}
  .bc-sep{color:var(--text3)}

  /* ── TOOLBAR ── */
  .toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .tl-left{display:flex;gap:6px;flex:1;flex-wrap:wrap}
  .btn{
    padding:7px 14px;border-radius:9px;border:none;cursor:pointer;
    font-family:'Figtree',sans-serif;font-size:13px;font-weight:600;
    transition:.15s;display:flex;align-items:center;gap:6px;
  }
  .btn svg{width:14px;height:14px}
  .btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
  .btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(61,127,255,.3)}
  .btn-g{background:var(--surface2);color:var(--text2);border:1px solid var(--border2)}
  .btn-g:hover{color:var(--text);border-color:var(--accent)}
  .btn-d{background:rgba(240,68,68,.1);color:var(--red);border:1px solid rgba(240,68,68,.2)}
  .btn-d:hover{background:rgba(240,68,68,.18)}
  .vbtns{display:flex;gap:3px}
  .vbtn{
    width:30px;height:30px;border-radius:7px;border:1px solid var(--border2);
    background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:var(--text3);transition:.15s;
  }
  .vbtn svg{width:13px;height:13px}
  .vbtn.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}

  /* ── GRID ── */
  .fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:11px}
  .fcard{
    background:var(--surface2);border:1px solid var(--border);border-radius:12px;
    padding:16px 13px 12px;cursor:pointer;transition:.18s;position:relative;user-select:none;
  }
  .fcard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.35)}
  .fcard.sel{border-color:var(--accent);background:var(--accent-soft)}
  .fcard .fci{width:40px;height:40px;margin-bottom:9px;display:flex;align-items:center;justify-content:center;border-radius:9px}
  .fcard .fci svg{width:26px;height:26px}
  .fcard .fcn{font-size:12.5px;font-weight:600;word-break:break-word;line-height:1.4;margin-bottom:3px}
  .fcard .fcm{font-size:11px;color:var(--text3)}
  .fcard .fc-chk{position:absolute;top:8px;right:8px;width:18px;height:18px;background:var(--accent);border-radius:50%;display:none;align-items:center;justify-content:center}
  .fcard .fc-chk svg{width:10px;height:10px;color:#fff}
  .fcard.sel .fc-chk{display:flex}
  .fcard .fc-more{position:absolute;top:7px;right:7px;opacity:0;transition:.15s}
  .fcard:hover .fc-more{opacity:1}
  .fcard.sel .fc-more{display:none}
  .more-btn{
    background:var(--surface);border:1px solid var(--border2);border-radius:6px;
    width:22px;height:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);
  }
  .more-btn svg{width:11px;height:11px}

  /* ── LIST ── */
  .flist{display:flex;flex-direction:column;gap:1px}
  .lhead{
    display:grid;grid-template-columns:36px 1fr 90px 130px 70px;
    padding:5px 11px;font-size:10.5px;color:var(--text3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  }
  .frow{
    display:grid;grid-template-columns:36px 1fr 90px 130px 70px;
    align-items:center;padding:8px 11px;border-radius:9px;
    cursor:pointer;transition:.15s;border:1px solid transparent;user-select:none;
  }
  .frow:hover{background:var(--surface2);border-color:var(--border)}
  .frow.sel{background:var(--accent-soft);border-color:var(--accent)}
  .frow .ri svg{width:19px;height:19px}
  .frow .rn{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:10px}
  .frow .rs{font-size:12px;color:var(--text3);text-align:right}
  .frow .rd{font-size:12px;color:var(--text3);text-align:right}
  .frow .ra{display:flex;gap:4px;justify-content:flex-end;opacity:0;transition:.15s}
  .frow:hover .ra{opacity:1}
  .ra-btn{
    background:var(--surface);border:1px solid var(--border2);border-radius:6px;
    padding:3px 6px;cursor:pointer;font-size:11px;color:var(--text2);transition:.15s;display:flex;align-items:center;
  }
  .ra-btn svg{width:11px;height:11px}
  .ra-btn:hover{color:var(--accent);border-color:var(--accent)}
  .ra-btn.del:hover{color:var(--red);border-color:var(--red)}

  /* ── EMPTY ── */
  .empty{text-align:center;padding:60px 20px}
  .empty-ico{
    width:68px;height:68px;border-radius:18px;background:var(--surface2);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
  }
  .empty-ico svg{width:32px;height:32px;color:var(--text3)}
  .empty h3{font-family:'Syne',sans-serif;font-size:16px;color:var(--text2);margin-bottom:5px}
  .empty p{font-size:13px;color:var(--text3);max-width:230px;margin:0 auto;line-height:1.6}

  /* ── DROP OVERLAY ── */
  .drop-ol{
    position:fixed;inset:0;z-index:200;background:rgba(7,9,16,.92);
    border:3px dashed var(--accent);
    display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;
  }
  .drop-ol.on{display:flex}
  .drop-ico{width:76px;height:76px;background:var(--accent-soft);border-radius:20px;display:flex;align-items:center;justify-content:center}
  .drop-ico svg{width:40px;height:40px;color:var(--accent)}
  .drop-ol p{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--accent)}

  /* ── MODALS ── */
  .mbg{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.65);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center}
  .mbg.open{display:flex}
  .modal{
    background:var(--surface);border:1px solid var(--border);border-radius:18px;
    padding:26px;min-width:300px;max-width:460px;width:90%;
    animation:mIn .25s cubic-bezier(.34,1.2,.64,1);
    box-shadow:0 32px 64px rgba(0,0,0,.6);
  }
  @keyframes mIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
  .mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .mhead h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
  .mclose{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:7px;display:flex;transition:.15s}
  .mclose:hover{color:var(--text);background:var(--surface2)}
  .mclose svg{width:15px;height:15px}
  .minput{
    width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;
    padding:10px 12px;color:var(--text);font-family:'Figtree',sans-serif;font-size:14px;
    outline:none;transition:.2s;margin-bottom:10px;
  }
  .minput:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .macts{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}

  /* Upload zone */
  .upzone{
    border:2px dashed var(--border2);border-radius:11px;padding:26px;text-align:center;
    cursor:pointer;transition:.2s;margin-bottom:10px;
  }
  .upzone:hover{border-color:var(--accent);background:var(--accent-soft)}
  .upzone svg{width:30px;height:30px;color:var(--text3);margin:0 auto 8px;display:block}
  .upzone p{font-size:13px;color:var(--text2)}
  .upzone span{font-size:11px;color:var(--text3)}
  .uplist{max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
  .upitem{
    display:flex;align-items:center;gap:8px;padding:7px 10px;
    background:var(--surface2);border-radius:7px;font-size:12.5px;
  }
  .upitem svg{width:13px;height:13px;color:var(--text3);flex-shrink:0}
  .upitem .un{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .upitem .us{color:var(--text3);flex-shrink:0;font-size:11px}
  .upitem .ust{flex-shrink:0}
  .pbar{height:3px;background:var(--border2);border-radius:3px;overflow:hidden;margin-top:8px}
  .pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:.2s;width:0%}

  /* Preview */
  #prev-modal .modal{max-width:680px}
  .prev-area{
    max-height:56vh;overflow:auto;text-align:center;
    border-radius:9px;background:var(--surface2);padding:6px;margin-bottom:12px;
  }
  .prev-area img,.prev-area video{max-width:100%;max-height:53vh;border-radius:7px;display:block;margin:0 auto}
  .prev-area audio{width:100%;margin:20px 0}

  /* Ctx menu */
  .ctx{
    position:fixed;z-index:500;background:var(--surface2);border:1px solid var(--border2);
    border-radius:11px;padding:5px;min-width:162px;
    box-shadow:0 16px 40px rgba(0,0,0,.55);animation:mIn .15s ease;display:none;
  }
  .ctx-i{
    padding:8px 11px;border-radius:7px;cursor:pointer;font-size:13px;
    display:flex;align-items:center;gap:9px;transition:.1s;color:var(--text2);
  }
  .ctx-i:hover{background:var(--border);color:var(--text)}
  .ctx-i svg{width:13px;height:13px;flex-shrink:0}
  .ctx-i.danger{color:var(--red)}
  .ctx-i.danger:hover{background:rgba(240,68,68,.1)}
  .ctx-hr{border:none;border-top:1px solid var(--border2);margin:4px 0}

  /* Toast */
  #toasts{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:6px}
  .toast{
    background:var(--surface2);border:1px solid var(--border2);border-radius:10px;
    padding:10px 14px;font-size:13px;display:flex;align-items:center;gap:9px;
    box-shadow:0 10px 28px rgba(0,0,0,.5);animation:mIn .3s ease;min-width:200px;max-width:300px;
  }
  .toast svg{width:15px;height:15px;flex-shrink:0}
  .toast.s{border-color:rgba(34,197,94,.3)} .toast.s svg{color:var(--green)}
  .toast.e{border-color:rgba(240,68,68,.3)} .toast.e svg{color:var(--red)}
  .toast.i svg{color:var(--accent)}

  /* Spin */
  .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;flex-shrink:0}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* Scrollbar */
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

  /* Icon colors */
  .ic-folder{color:#f59e0b}
  .ic-image{color:#3d7fff}
  .ic-video{color:#8b5cf6}
  .ic-audio{color:#ec4899}
  .ic-doc{color:#22c55e}
  .ic-zip{color:#f97316}
  .ic-code{color:#06b6d4}
  .ic-file{color:var(--text3)}

  @media(max-width:640px){
    .sidebar{position:fixed;left:-240px;z-index:50;height:100vh}
    .sidebar.open{left:0;box-shadow:10px 0 40px rgba(0,0,0,.6)}
    .mob-btn{display:flex}
    .lhead,.frow .rd,.frow .rs,.frow .ra{display:none}
    .frow{grid-template-columns:36px 1fr}
    .content{padding:12px}
  }
</style>
</head>
<body>

<div class="shell">
  <!-- ── SIDEBAR ── -->
  <nav class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-logo" id="sb-logo">
        <img src="icon.png" alt="" onerror="this.parentNode.innerHTML=sbLogoFb()">
      </div>
      <div class="sb-title">Cloud<span>Mare</span></div>
    </div>
    <div class="sb-nav">
      <div class="sb-item active" id="nav-my" onclick="navTo('my')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h6l2 2h10a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/></svg>
        My Files
      </div>
      <div class="sb-item" id="nav-recent" onclick="navTo('recent')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Recent
      </div>
      <div class="sb-item" id="nav-starred" onclick="navTo('starred')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Starred
      </div>
      <div class="sb-item" id="nav-trash" onclick="navTo('trash')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Trash
      </div>
      <div class="sb-sec">By Type</div>
      <div class="sb-item" onclick="navType('image')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Images
      </div>
      <div class="sb-item" onclick="navType('video')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        Videos
      </div>
      <div class="sb-item" onclick="navType('audio')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Audio
      </div>
      <div class="sb-item" onclick="navType('doc')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Documents
      </div>
    </div>
    <div class="sb-foot">

<script>
// ═══════════════════════════════════════════════
// SESSION — redirect if not connected
// ═══════════════════════════════════════════════
let S = null;
try{ S = JSON.parse(sessionStorage.getItem('cm_active')); }catch{}
if(!S){ try{ S = JSON.parse(localStorage.getItem('cm_sess')); }catch{} }
if(!S || !S.token){ window.location.href = 'index.html'; throw 0; }

const TOKEN   = S.token;
const CHAT_ID = S.chatId;
const BOT_NAME = S.botName || 'Bot';
const TG = `https://api.telegram.org/bot${TOKEN}`;

// ═══════════════════════════════════════════════
// FILES STATE
// files[] — stored in localStorage per CHAT_ID
// Each file: { id, name, size, type, date, tg_file_id, tg_msg_id, folder, starred, trashed }
// ═══════════════════════════════════════════════
const DB_KEY = 'cm_files_' + btoa(CHAT_ID).replace(/=/g,'');
let files = [];
let nav = 'my';      // my | recent | starred | trash
let navType = null;  // image | video | audio | doc | null
let folder = null;   // current folder id or null = root
let view = 'grid';
let sel = new Set();
let upQueue = [];
let renameId = null;
let searchQ = '';

function saveFiles(){ try{ localStorage.setItem(DB_KEY, JSON.stringify(files)); }catch{} }
function loadFiles(){ try{ files = JSON.parse(localStorage.getItem(DB_KEY)||'[]'); }catch{ files=[]; } }

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function sbLogoFb(){
  return `<div class="sb-logo-fb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" color="#fff"><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg></div>`;
}

async function init(){
  loadFiles();
  document.getElementById('u-av').textContent = BOT_NAME[0].toUpperCase();
  document.getElementById('u-name').textContent = BOT_NAME;
  document.getElementById('u-bot').textContent = '@' + BOT_NAME.toLowerCase().replace(/\s+/g,'_');
  render();
  updateStorage();
  // Auto sync on load
  await syncFromTelegram(true);
}

function doLogout(){
  if(!confirm('Disconnect from CloudMare?\n\nYour files in Telegram will remain safe.')) return;
  localStorage.removeItem('cm_sess');
  sessionStorage.removeItem('cm_active');
  window.location.href = 'index.html';
}
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }
document.addEventListener('click', e=>{ if(!e.target.closest('.sidebar') && window.innerWidth<=640) document.getElementById('sidebar').classList.remove('open'); });

// ═══════════════════════════════════════════════
// TELEGRAM SYNC — reads ALL messages from channel
// and rebuilds file index from captions
// ═══════════════════════════════════════════════
async function syncFromTelegram(silent=false){
  if(!silent) showSyncBanner('Syncing files from Telegram…');
  try{
    // Fetch up to 100 recent messages
    const r = await fetch(`${TG}/getUpdates?limit=100&allowed_updates=["channel_post","message"]`);
    // getUpdates only works for bots receiving messages; for stored channel msgs use forwardMessage trick
    // Better approach: we already have tg_msg_ids in our local DB
    // For cross-device sync: store a special INDEX message in the channel and sync from that

    // ── INDEX-based sync ──
    // On first connect: fetch the pinned INDEX message from the channel
    const pinR = await fetch(`${TG}/getChat?chat_id=${CHAT_ID}`);
    const pinD = await pinR.json();

    if(pinD.ok && pinD.result.pinned_message){
      const pinMsg = pinD.result.pinned_message;
      const txt = pinMsg.text || pinMsg.caption || '';
      if(txt.startsWith('CLOUDMARE_INDEX:')){
        try{
          const remoteFiles = JSON.parse(txt.slice('CLOUDMARE_INDEX:'.length));
          if(Array.isArray(remoteFiles) && remoteFiles.length > 0){
            // Merge: remote wins for shared IDs, keep local-only entries
            const remoteIds = new Set(remoteFiles.map(f=>f.id));
            const localOnly = files.filter(f=>!remoteIds.has(f.id));
            files = [...remoteFiles, ...localOnly];
            saveFiles();
            if(!silent) toast('Synced from Telegram','s');
          }
        }catch{}
      }
    }
  }catch(e){
    if(!silent) toast('Sync failed — check connection','e');
  }
  hideSyncBanner();
  render();
  updateStorage();
}

// Save index to Telegram as pinned message
async function pushIndexToTelegram(){
  // Non-trashed, non-folder files metadata (no blob data)
  const idx = files.filter(f=>!f.trashed);
  const payload = 'CLOUDMARE_INDEX:' + JSON.stringify(idx);

  // Check if index message exists
  const key = DB_KEY + '_idx_msg';
  const existingMsgId = localStorage.getItem(key);

  try{
    if(existingMsgId){
      // Edit existing
      const r = await fetch(`${TG}/editMessageText`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ chat_id: CHAT_ID, message_id: parseInt(existingMsgId), text: payload })
      });
      const d = await r.json();
      if(!d.ok) throw new Error('edit failed');
    } else {
      // Send new index message and pin it
      const r = await fetch(`${TG}/sendMessage`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ chat_id: CHAT_ID, text: payload })
      });
      const d = await r.json();
      if(d.ok){
        const msgId = d.result.message_id;
        localStorage.setItem(key, msgId);
        // Pin it
        await fetch(`${TG}/pinChatMessage`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ chat_id: CHAT_ID, message_id: msgId, disable_notification: true })
        });
      }
    }
  }catch(e){
    console.warn('Index push failed:', e.message);
  }
}

function showSyncBanner(txt){
  document.getElementById('sync-txt').textContent = txt;
  document.getElementById('sync-banner').classList.add('on');
}
function hideSyncBanner(){ document.getElementById('sync-banner').classList.remove('on'); }

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function navTo(section){
  nav=section; navType=null; searchQ=''; folder=null;
  document.getElementById('search-inp').value='';
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('nav-'+section); if(el) el.classList.add('active');
  sel.clear(); updateSelBtn(); render();
}
function navType2(type){ navType=type; nav='my'; folder=null; searchQ=''; render(); }
function doSearch(){ searchQ=document.getElementById('search-inp').value; render(); }

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function getVisible(){
  let list=[...files];
  if(nav==='starred') list=list.filter(f=>f.starred&&!f.trashed);
  else if(nav==='trash') list=list.filter(f=>f.trashed);
  else if(nav==='recent') list=list.filter(f=>!f.trashed).sort((a,b)=>b.date-a.date).slice(0,40);
  else{
    list=list.filter(f=>!f.trashed&&f.folder===(folder||'root'));
    if(navType) list=list.filter(f=>f.type===navType);
  }
  if(searchQ) list=list.filter(f=>f.name.toLowerCase().includes(searchQ.toLowerCase()));
  list.sort((a,b)=>(a.type==='folder'?-1:1)-(b.type==='folder'?-1:1)||(b.date-a.date));
  return list;
}

function render(){
  updateBC();
  updateStorage();
  const list=getVisible();
  const area=document.getElementById('file-area');
  if(!list.length){ area.innerHTML=emptyHtml(); return; }
  area.innerHTML = view==='grid'
    ? `<div class="fgrid">${list.map(f=>cardHtml(f)).join('')}</div>`
    : `<div class="lhead"><span></span><span>Name</span><span style="text-align:right">Size</span><span style="text-align:right">Modified</span><span></span></div><div class="flist">${list.map(f=>rowHtml(f)).join('')}</div>`;
  bindItems();
}

function emptyHtml(){
  const icons={
    trash:`<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>`,
    starred:`<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>`,
    my:`<path d="M3 3h6l2 2h10a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>`,
  };
  const titles={trash:'Trash is empty',starred:'Nothing starred yet',my:'No files here',recent:'No recent files'};
  const descs={trash:'Deleted files appear here.',starred:'Star files to find them quickly.',my:'Upload files or create a folder to get started.',recent:'Your recently accessed files appear here.'};
  const k=icons[nav]?nav:'my';
  return `<div class="empty"><div class="empty-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32" style="color:var(--text3)">${icons[k]}</svg></div><h3>${titles[nav]||titles.my}</h3><p>${descs[nav]||descs.my}</p></div>`;
}

function cardHtml(f){
  const s=sel.has(f.id);
  return `<div class="fcard${s?' sel':''}" data-id="${f.id}" ondblclick="openItem('${f.id}')" oncontextmenu="showCtx(event,'${f.id}')">
    <div class="fci">${typeIcon(f,26)}</div>
    <div class="fcn">${esc(f.name)}</div>
    <div class="fcm">${f.type==='folder'?'Folder':fmtSize(f.size)}</div>
    <div class="fc-chk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="10" height="10"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div class="fc-more"><button class="more-btn" onclick="showCtx(event,'${f.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg></button></div>
  </div>`;
}

function rowHtml(f){
  const s=sel.has(f.id);
  return `<div class="frow${s?' sel':''}" data-id="${f.id}" ondblclick="openItem('${f.id}')" oncontextmenu="showCtx(event,'${f.id}')">
    <div class="ri">${typeIcon(f,19)}</div>
    <div class="rn">${esc(f.name)}${f.starred?` <svg viewBox="0 0 24 24" fill="#f59e0b" width="11" height="11" style="vertical-align:middle"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`:''}</div>
    <div class="rs">${f.type==='folder'?'—':fmtSize(f.size)}</div>
    <div class="rd">${fmtDate(f.date)}</div>
    <div class="ra">
      <button class="ra-btn" onclick="previewItem('${f.id}',event)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      <button class="ra-btn" onclick="dlItem('${f.id}',event)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/></svg></button>
      <button class="ra-btn del" onclick="trashItem('${f.id}',event)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
    </div>
  </div>`;
}

function typeIcon(f,sz){
  const s=sz+'px';
  if(f.type==='folder') return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="${s}" height="${s}" class="ic-folder"><path d="M3 3h6l2 2h10a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/></svg>`;
  const map={
    image:[`<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>`,'ic-image'],
    video:[`<polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>`,'ic-video'],
    audio:[`<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>`,'ic-audio'],
    doc:[`<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>`,'ic-doc'],
    zip:[`<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M12 18v-6M12 12h2M12 9h2M12 6h2"/>`,'ic-zip'],
    code:[`<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>`,'ic-code'],
    file:[`<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>`,'ic-file'],
  };
  const [path,cls] = map[f.type]||map.file;
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="${s}" height="${s}" class="${cls}">${path}</svg>`;
}

function bindItems(){
  document.querySelectorAll('[data-id]').forEach(el=>{
    el.addEventListener('click', e=>{
      if(e.target.closest('button')) return;
      const id=el.dataset.id;
      if(e.ctrlKey||e.metaKey||e.shiftKey){ sel.has(id)?sel.delete(id):sel.add(id); }
      else{ sel.clear(); }
      updateSelBtn(); render();
    });
  });
}

function updateSelBtn(){ document.getElementById('del-sel-btn').style.display=sel.size?'flex':'none'; }

function updateBC(){
  const bc=document.getElementById('bc');
  let h=`<span class="bc-item" onclick="navTo('my')">My Files</span>`;
  if(folder){ const f=files.find(x=>x.id===folder); if(f) h+=`<span class="bc-sep">›</span><span class="bc-item cur">${esc(f.name)}</span>`; }
  bc.innerHTML=h;
}

function updateStorage(){
  const tot=files.filter(f=>!f.trashed&&f.type!=='folder').reduce((s,f)=>s+(f.size||0),0);
  document.getElementById('used-lbl').textContent=fmtSize(tot)+' used';
}

// ═══════════════════════════════════════════════
// OPEN / PREVIEW / DOWNLOAD
// ═══════════════════════════════════════════════
function openItem(id){
  const f=files.find(x=>x.id===id); if(!f) return;
  if(f.type==='folder'){ folder=f.id; render(); return; }
  previewItem(id);
}

async function previewItem(id,e){
  if(e) e.stopPropagation();
  const f=files.find(x=>x.id===id);
  if(!f||f.type==='folder') return;
  if(!f.tg_file_id){ toast('No preview — file not in Telegram','e'); return; }
  document.getElementById('prev-title').textContent=f.name;
  document.getElementById('prev-area').innerHTML=`<div style="padding:40px;color:var(--text3);font-size:13px">Loading preview…</div>`;
  document.getElementById('prev-modal').classList.add('open');
  document.getElementById('prev-dl').onclick=()=>dlItem(id);
  document.getElementById('prev-share').onclick=()=>copyLink(id);
  try{
    const url=await getTgUrl(f.tg_file_id);
    const pa=document.getElementById('prev-area');
    if(f.type==='image') pa.innerHTML=`<img src="${url}" alt="${esc(f.name)}">`;
    else if(f.type==='video') pa.innerHTML=`<video src="${url}" controls></video>`;
    else if(f.type==='audio') pa.innerHTML=`<audio src="${url}" controls></audio>`;
    else pa.innerHTML=`<div style="padding:36px;color:var(--text2);font-size:13px;text-align:center"><div style="margin-bottom:12px">No inline preview for this file type.</div><a href="${url}" target="_blank" style="color:var(--accent)">Open file in new tab ↗</a></div>`;
  }catch{ document.getElementById('prev-area').innerHTML=`<p style="padding:30px;color:var(--red);font-size:13px">Preview failed. Try downloading instead.</p>`; }
}

async function dlItem(id,e){
  if(e) e.stopPropagation();
  const f=files.find(x=>x.id===id);
  if(!f||!f.tg_file_id){ toast('Cannot download this file','e'); return; }
  toast('Preparing download…','i');
  try{ const url=await getTgUrl(f.tg_file_id); const a=document.createElement('a'); a.href=url; a.download=f.name; a.target='_blank'; a.click(); }
  catch{ toast('Download failed','e'); }
}

async function copyLink(id){
  const f=files.find(x=>x.id===id);
  if(!f||!f.tg_file_id){ toast('No link available','e'); return; }
  try{ const url=await getTgUrl(f.tg_file_id); await navigator.clipboard.writeText(url); toast('Link copied!','s'); }
  catch{ toast('Could not copy link','e'); }
}

async function getTgUrl(fileId){
  const r=await fetch(`${TG}/getFile?file_id=${fileId}`);
  const d=await r.json();
  if(!d.ok) throw new Error('getFile failed');
  return `https://api.telegram.org/file/bot${TOKEN}/${d.result.file_path}`;
}

// ═══════════════════════════════════════════════
// UPLOAD
// ═══════════════════════════════════════════════
function openUpload(){ closeCtx(); upQueue=[]; renderUpList(); document.getElementById('up-modal').classList.add('open'); }

function queueFiles(fl){
  Array.from(fl).forEach(f=>{ if(!upQueue.find(u=>u.file.name===f.name&&u.file.size===f.size)) upQueue.push({file:f,status:'pending'}); });
  renderUpList();
}

function renderUpList(){
  const el=document.getElementById('uplist');
  if(!upQueue.length){ el.innerHTML=''; return; }
  el.innerHTML=upQueue.map(u=>`
    <div class="upitem">
      ${typeIcon({type:mimeToType(u.file.type),name:u.file.name},13)}
      <span class="un">${esc(u.file.name)}</span>
      <span class="us">${fmtSize(u.file.size)}</span>
      <span class="ust">${u.status==='done'?`<svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>`:u.status==='uploading'?`<div class="spin"></div>`:u.status==='error'?`<svg viewBox="0 0 24 24" fill="none" stroke="#f04444" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`:''}</span>
    </div>`).join('');
}

async function startUpload(){
  if(!upQueue.length){ toast('No files selected','e'); return; }
  const btn=document.getElementById('up-btn'); btn.disabled=true;
  const pbarWrap=document.getElementById('pbar-wrap'); pbarWrap.style.display='block';
  let done=0;
  for(let i=0;i<upQueue.length;i++){
    const u=upQueue[i]; u.status='uploading'; renderUpList();
    try{ await uploadToTg(u.file); u.status='done'; done++; }
    catch(err){ u.status='error'; console.warn('Upload failed:',err.message); }
    document.getElementById('pfill').style.width=Math.round((i+1)/upQueue.length*100)+'%';
    renderUpList();
  }
  btn.disabled=false;
  saveFiles();
  // Push updated index to Telegram for cross-device sync
  pushIndexToTelegram();
  closeModal('up-modal');
  render();
  updateStorage();
  if(done) toast(`${done} file${done>1?'s':''} uploaded successfully`,'s');
  else toast('Upload failed — check bot permissions','e');
}

async function uploadToTg(file){
  const form=new FormData();
  const t=mimeToType(file.type);
  const method=t==='image'?'sendPhoto':t==='audio'?'sendAudio':t==='video'?'sendVideo':'sendDocument';
  const field=t==='image'?'photo':t==='audio'?'audio':t==='video'?'video':'document';
  const cap=JSON.stringify({cm:1,name:file.name,folder:folder||'root',ts:Date.now()});
  form.append(field,file); form.append('caption',cap);
  const r=await fetch(`${TG}/${method}?chat_id=${CHAT_ID}`,{method:'POST',body:form});
  const d=await r.json();
  if(!d.ok) throw new Error(d.description||'Upload failed');
  const msg=d.result;
  const tgf=msg.photo?msg.photo[msg.photo.length-1]:msg.document||msg.audio||msg.video;
  files.push({
    id:'f'+Date.now()+Math.random().toString(36).slice(2,6),
    name:file.name, size:file.size, type:t, date:Date.now(),
    tg_file_id:tgf?.file_id||'', tg_msg_id:msg.message_id,
    folder:folder||'root', starred:false, trashed:false
  });
}

// ═══════════════════════════════════════════════
// FOLDER
// ═══════════════════════════════════════════════
function openNewFolder(){ closeCtx(); document.getElementById('folder-inp').value=''; document.getElementById('folder-modal').classList.add('open'); setTimeout(()=>document.getElementById('folder-inp').focus(),100); }
function makeFolder(){
  const name=document.getElementById('folder-inp').value.trim();
  if(!name){ toast('Enter a folder name','e'); return; }
  files.push({id:'d'+Date.now()+Math.random().toString(36).slice(2,6),name,size:0,type:'folder',date:Date.now(),tg_file_id:'',tg_msg_id:0,folder:folder||'root',starred:false,trashed:false});
  saveFiles(); pushIndexToTelegram();
  closeModal('folder-modal'); render(); toast('Folder created','s');
}

// ═══════════════════════════════════════════════
// RENAME / STAR / DELETE
// ═══════════════════════════════════════════════
function startRename(id){
  renameId=id;
  const f=files.find(x=>x.id===id); if(!f) return;
  document.getElementById('rename-inp').value=f.name;
  document.getElementById('rename-modal').classList.add('open');
  setTimeout(()=>{ const inp=document.getElementById('rename-inp'); inp.focus(); const dot=f.name.lastIndexOf('.'); inp.setSelectionRange(0,dot>0?dot:f.name.length); },100);
}
function applyRename(){
  const name=document.getElementById('rename-inp').value.trim();
  if(!name){ toast('Enter a name','e'); return; }
  const f=files.find(x=>x.id===renameId); if(f){ f.name=name; saveFiles(); pushIndexToTelegram(); render(); toast('Renamed','s'); }
  closeModal('rename-modal');
}
function toggleStar(id){
  const f=files.find(x=>x.id===id); if(!f) return;
  f.starred=!f.starred; saveFiles(); pushIndexToTelegram(); render();
  toast(f.starred?'Added to Starred':'Removed from Starred','i');
}
function trashItem(id,e){
  if(e) e.stopPropagation();
  const f=files.find(x=>x.id===id); if(!f) return;
  if(f.trashed){
    if(!confirm(`Permanently delete "${f.name}"?`)) return;
    files=files.filter(x=>x.id!==id);
    if(f.tg_msg_id) fetch(`${TG}/deleteMessage?chat_id=${CHAT_ID}&message_id=${f.tg_msg_id}`).catch(()=>{});
    toast('Permanently deleted','i');
  } else { f.trashed=true; toast('Moved to Trash','i'); }
  saveFiles(); pushIndexToTelegram(); render();
}
function deleteSelected(){ sel.forEach(id=>trashItem(id)); sel.clear(); updateSelBtn(); }

// ═══════════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════════
function showCtx(e,id){
  e.preventDefault(); e.stopPropagation();
  const f=files.find(x=>x.id===id); if(!f) return;
  const m=document.getElementById('ctx');
  m.style.display='block';
  m.style.left=Math.min(e.clientX,window.innerWidth-170)+'px';
  m.style.top=Math.min(e.clientY,window.innerHeight-230)+'px';
  const isFile=f.type!=='folder';
  document.getElementById('ctx-open').onclick=()=>{openItem(id);closeCtx()};
  document.getElementById('ctx-dl').style.display=isFile?'flex':'none';
  document.getElementById('ctx-dl').onclick=()=>{dlItem(id);closeCtx()};
  document.getElementById('ctx-share').style.display=isFile?'flex':'none';
  document.getElementById('ctx-share').onclick=()=>{copyLink(id);closeCtx()};
  document.getElementById('ctx-rename').onclick=()=>{startRename(id);closeCtx()};
  const starEl=document.getElementById('ctx-star');
  starEl.innerHTML=`<svg viewBox="0 0 24 24" fill="${f.starred?'#f59e0b':'none'}" stroke="${f.starred?'#f59e0b':'currentColor'}" stroke-width="2" width="13" height="13"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${f.starred?'Unstar':'Star'}`;
  starEl.onclick=()=>{toggleStar(id);closeCtx()};
  document.getElementById('ctx-del').onclick=()=>{trashItem(id);closeCtx()};
}
function closeCtx(){ document.getElementById('ctx').style.display='none'; }
document.addEventListener('click',closeCtx);
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeCtx(); document.querySelectorAll('.mbg.open').forEach(m=>m.classList.remove('open')); }});

// ═══════════════════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════════════════
function onDragOver(e){ e.preventDefault(); document.getElementById('drop-ol').classList.add('on'); }
function onDragLeave(e){ if(!document.getElementById('content').contains(e.relatedTarget)) document.getElementById('drop-ol').classList.remove('on'); }
async function onDrop(e){
  e.preventDefault(); document.getElementById('drop-ol').classList.remove('on');
  const dropped=Array.from(e.dataTransfer.files); if(!dropped.length) return;
  toast(`Uploading ${dropped.length} file${dropped.length>1?'s':''}…`,'i');
  let done=0;
  for(const f of dropped){ try{ await uploadToTg(f); done++; }catch{ toast('Failed: '+f.name,'e'); } }
  saveFiles(); pushIndexToTelegram(); render(); updateStorage();
  if(done) toast(`${done} file${done>1?'s':''} uploaded`,'s');
}

// ═══════════════════════════════════════════════
// VIEW & MODALS
// ═══════════════════════════════════════════════
function setView(v){
  view=v;
  document.getElementById('vb-g').classList.toggle('on',v==='grid');
  document.getElementById('vb-l').classList.toggle('on',v==='list');
  render();
}
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function fmtSize(b){
  if(!b) return '0 B';
  const u=['B','KB','MB','GB']; let i=0;
  while(b>=1024&&i<3){b/=1024;i++;}
  return b.toFixed(i?1:0)+' '+u[i];
}
function fmtDate(ts){ return new Date(ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function mimeToType(m){
  if(!m) return 'file';
  if(m.startsWith('image/')) return 'image';
  if(m.startsWith('video/')) return 'video';
  if(m.startsWith('audio/')) return 'audio';
  if(['application/pdf','application/msword','application/vnd.openxmlformats','text/plain','text/csv'].some(x=>m.startsWith(x))) return 'doc';
  if(['application/zip','application/x-rar','application/x-7z'].some(x=>m.startsWith(x))) return 'zip';
  if(['text/html','text/css','application/javascript','application/json','text/x-python'].some(x=>m.startsWith(x))) return 'code';
  return 'file';
}
function toast(msg,type='i'){
  const ico={s:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`,e:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,i:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`};
  const t=document.createElement('div');
  t.className='toast '+type;
  t.innerHTML=(ico[type]||ico.i)+`<span>${msg}</span>`;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),3400);
}

// ── SIDEBAR nav type helper (called from HTML) ──
function navType(type){ navType2(type); }

// BOOT
init();
</script>
